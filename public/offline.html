<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Coursecast</title>
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; background: #000; color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center; padding: 24px;
    }
    .logo { width: 64px; height: 64px; }
    h1 { font-size: 18px; font-weight: 700; margin: 8px 0 0; }
    p { font-size: 14px; color: #b8b8bd; margin: 0; max-width: 280px; }
    button {
      margin-top: 12px; padding: 10px 20px; border-radius: 12px; border: 0;
      background: #4ade80; color: #04201a; font-weight: 600; font-size: 14px; cursor: pointer;
    }
  </style>
</head>
<body>
  <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 20V4.5"/>
    <path d="M8 4.5l7 2.25L8 9"/>
    <path d="M5.5 20h5"/>
    <path d="M16.4 4a4.5 4.5 0 0 1 1.9 3.5"/>
    <path d="M18 2.1a7.5 7.5 0 0 1 3 5.4"/>
  </svg>
  <h1>Je bent offline</h1>
  <p>Coursecast heeft een internetverbinding nodig om wedstrijden live bij te houden.</p>
  <button onclick="location.reload()">Opnieuw proberen</button>
</body>
</html>
